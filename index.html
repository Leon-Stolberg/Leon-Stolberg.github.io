<title>Leon Stolberg</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Inter",sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#E6007E,#FFED00);
color:white;
}

/* card */

.card{
width:40vh;
padding:3vh 3vh;
text-align:center;
border-radius:2vh;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(2vh);
box-shadow:0 2vh 6vh rgba(0,0,0,0.3);
}

/* profile */

.profile{
width:11vh;
height:11vh;
border-radius:50%;
object-fit:cover;
border:.3vh solid white;
margin-bottom:1.5vh;
}

/* text */

h1{
font-size:2.1vh;
margin-bottom:.5vh;
}

.bio{
font-size:1vh;
opacity:0.85;
margin-bottom:1.5vh;
}

/* links */

.link{
display:flex;
align-items:center;
justify-content:center;
gap:.5vh;
text-decoration:none;
color:white;
padding:1vh;
margin:1vh 0;
border-radius:1vh;
background:rgba(255,255,255,0.15);
font-weight:500;
transition:all .25s ease;
}

.link:hover{
transform:translateY(-5px) scale(1.03);
background:white;
color:#222;
box-shadow:0 1vh 3vh rgba(0,0,0,0.3);
}

/* icons */

.icon{
width:1.5vh;
height:1.5vh;
fill:currentColor;
transition:transform .3s ease;
}

/* icon animation */

.link:hover .icon{
transform:rotate(12deg) scale(1.25);
}

/* footer */

footer{
margin-top:2vh;
font-size:.75vh;
opacity:0.7;
}

</style>
</head>

<body>
